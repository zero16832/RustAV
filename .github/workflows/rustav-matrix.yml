name: RustAV Public CI

on:
  push:
    paths:
      - '.github/workflows/rustav-matrix.yml'
      - 'include/**'
      - 'TestFiles/**'
      - 'UnityAVExample/**'
  pull_request:
    paths:
      - '.github/workflows/rustav-matrix.yml'
      - 'include/**'
      - 'TestFiles/**'
      - 'UnityAVExample/**'
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'RustAV-Core git ref or SHA'
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CORE_REPOSITORY: zero16832/RustAV-Core

jobs:
  windows-validate:
    name: Windows Native Validate
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: windows-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.inputs.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve RustAV-Core auth mode
        id: core-auth
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }
          if ($hasApp) {
            'mode=app' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'mode=pat' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create RustAV-Core app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core with app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout RustAV-Core with PAT
        if: ${{ steps.core-auth.outputs.mode == 'pat' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            RustAV-Core -> RustAV-Core/target

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.vcpkg
          key: ${{ runner.os }}-vcpkg-x64-windows-${{ hashFiles('.github/workflows/rustav-matrix.yml', 'RustAV-Core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-

      - name: Setup FFmpeg (vcpkg)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE '.vcpkg'

          if (-not (Test-Path "$vcpkgRoot\.git")) {
            if (Test-Path $vcpkgRoot) {
              Remove-Item -LiteralPath $vcpkgRoot -Recurse -Force
            }
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          & "$vcpkgRoot\vcpkg.exe" install 'ffmpeg:x64-windows' --disable-metrics

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'VCPKG_DEFAULT_TRIPLET=x64-windows' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'VCPKGRS_DYNAMIC=1' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          "$vcpkgRoot\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$vcpkgRoot\installed\x64-windows\tools\ffmpeg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cargo Check
        shell: pwsh
        run: |
          cargo check --manifest-path RustAV-Core/Cargo.toml --lib --examples --locked

      - name: Cargo Test
        shell: pwsh
        run: |
          cargo test --manifest-path RustAV-Core/Cargo.toml --lib --tests --locked

      - name: Validate CI Entrypoints
        shell: pwsh
        run: |
          python "$env:GITHUB_WORKSPACE\RustAV-Core\scripts\ci\validate_ci_entrypoints.py" --public-root "$env:GITHUB_WORKSPACE" --core-root "$env:GITHUB_WORKSPACE\RustAV-Core"

      - name: Build Windows Unity Plugin
        shell: pwsh
        run: |
          python "$env:GITHUB_WORKSPACE\RustAV-Core\scripts\ci\build_unity_plugins.py" --public-root "$env:GITHUB_WORKSPACE" --core-root "$env:GITHUB_WORKSPACE\RustAV-Core" --platform windows --output-root 'target/unity-package/windows'

      - name: Cache MediaMTX
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.ci-tools\mediamtx_v1.16.3_windows_amd64
          key: ${{ runner.os }}-mediamtx-1.16.3

      - name: Setup Validation Tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --yes --no-progress
          }

          $ffmpegPath = (Get-Command ffmpeg -ErrorAction Stop).Source
          $ffmpegEncoders = & $ffmpegPath -hide_banner -encoders
          if (-not ($ffmpegEncoders | Select-String 'libx264')) {
            throw 'ffmpeg does not provide libx264 encoder'
          }

          $toolsRoot = Join-Path $env:GITHUB_WORKSPACE '.ci-tools'
          $mediamtxDir = Join-Path $toolsRoot 'mediamtx_v1.16.3_windows_amd64'
          $mediamtxExe = Join-Path $mediamtxDir 'mediamtx.exe'
          if (-not (Test-Path $mediamtxExe)) {
            New-Item -ItemType Directory -Force -Path $toolsRoot | Out-Null
            $zipPath = Join-Path $toolsRoot 'mediamtx_v1.16.3_windows_amd64.zip'
            Invoke-WebRequest -Uri 'https://github.com/bluenviron/mediamtx/releases/download/v1.16.3/mediamtx_v1.16.3_windows_amd64.zip' -OutFile $zipPath
            if (Test-Path $mediamtxDir) {
              Remove-Item -LiteralPath $mediamtxDir -Recurse -Force
            }
            Expand-Archive -Path $zipPath -DestinationPath $mediamtxDir -Force
          }

          "FFMPEG_EXE=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MEDIA_MTX_EXE=$mediamtxExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Win32 Visual Validation
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\RustAV-Core\scripts\qa\run_win32_visual_validation.ps1" `
            -RustAVRoot "$env:GITHUB_WORKSPACE" `
            -CoreRoot "$env:GITHUB_WORKSPACE\RustAV-Core" `
            -RtspUri 'rtsp://127.0.0.1:8554/mystream' `
            -RtmpUri 'rtmp://127.0.0.1:1935/mystream' `
            -ValidationSeconds 8 `
            -MinPlaybackSeconds 2.0 `
            -FfmpegExe "$env:FFMPEG_EXE" `
            -MediaMtxExe "$env:MEDIA_MTX_EXE"

      - name: Upload Win32 Validation Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustav-win32-visual-validation-logs
          path: artifacts/win32-validation
          if-no-files-found: warn

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-windows-x86_64-unity-plugin
          path: target/unity-package/windows
          if-no-files-found: error

  unity-validation-build:
    name: Build Unity Validation Player
    if: ${{ vars.RUSTAV_ENABLE_UNITY_BUILD == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    needs:
      - windows-validate
    env:
      UNITY_PROJECT_PATH: UnityAVExample

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.inputs.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve RustAV-Core auth mode
        id: core-auth
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }
          if ($hasApp) {
            'mode=app' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'mode=pat' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create RustAV-Core app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core with app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout RustAV-Core with PAT
        if: ${{ steps.core-auth.outputs.mode == 'pat' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download Windows Plugin Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-windows-x86_64-unity-plugin
          path: artifacts/windows

      - name: Inject Plugins Into Unity Project
        run: |
          python3 "$GITHUB_WORKSPACE/RustAV-Core/scripts/ci/sync_unity_plugins_to_project.py" --public-root "$GITHUB_WORKSPACE" --unity-project "$UNITY_PROJECT_PATH" --plugins-root 'artifacts/windows/Assets/Plugins' --managed-runtime-root 'artifacts/windows/Assets/UnityAV'

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.UNITY_PROJECT_PATH }}/Library
          key: ${{ runner.os }}-unity-validation-library-${{ hashFiles('UnityAVExample/Assets/**', 'UnityAVExample/Packages/manifest.json', 'UnityAVExample/ProjectSettings/**', '.github/workflows/rustav-matrix.yml') }}
          restore-keys: |
            ${{ runner.os }}-unity-validation-library-

      - name: Build Unity Validation Player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          allowDirtyBuild: true
          buildMethod: UnityAV.Editor.CodexValidationBuild.BuildWindowsValidationPlayer

      - name: Upload Unity Validation Player
        uses: actions/upload-artifact@v4
        with:
          name: unity-validation-player-windows
          path: UnityAVExample/Build/CodexPullValidation
          if-no-files-found: error

  unity-visual-validate:
    name: Unity Visual Validate
    if: ${{ vars.RUSTAV_ENABLE_UNITY_BUILD == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: windows-latest
    needs:
      - unity-validation-build

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.inputs.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve RustAV-Core auth mode
        id: core-auth
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }
          if ($hasApp) {
            'mode=app' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'mode=pat' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create RustAV-Core app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core with app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout RustAV-Core with PAT
        if: ${{ steps.core-auth.outputs.mode == 'pat' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Cache MediaMTX
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.ci-tools\mediamtx_v1.16.3_windows_amd64
          key: ${{ runner.os }}-mediamtx-1.16.3

      - name: Setup Validation Tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --yes --no-progress
          }

          $ffmpegPath = (Get-Command ffmpeg -ErrorAction Stop).Source
          $ffmpegEncoders = & $ffmpegPath -hide_banner -encoders
          if (-not ($ffmpegEncoders | Select-String 'libx264')) {
            throw 'ffmpeg does not provide libx264 encoder'
          }

          $toolsRoot = Join-Path $env:GITHUB_WORKSPACE '.ci-tools'
          $mediamtxDir = Join-Path $toolsRoot 'mediamtx_v1.16.3_windows_amd64'
          $mediamtxExe = Join-Path $mediamtxDir 'mediamtx.exe'
          if (-not (Test-Path $mediamtxExe)) {
            New-Item -ItemType Directory -Force -Path $toolsRoot | Out-Null
            $zipPath = Join-Path $toolsRoot 'mediamtx_v1.16.3_windows_amd64.zip'
            Invoke-WebRequest -Uri 'https://github.com/bluenviron/mediamtx/releases/download/v1.16.3/mediamtx_v1.16.3_windows_amd64.zip' -OutFile $zipPath
            if (Test-Path $mediamtxDir) {
              Remove-Item -LiteralPath $mediamtxDir -Recurse -Force
            }
            Expand-Archive -Path $zipPath -DestinationPath $mediamtxDir -Force
          }

          "FFMPEG_EXE=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MEDIA_MTX_EXE=$mediamtxExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download Unity Validation Player
        uses: actions/download-artifact@v4
        with:
          name: unity-validation-player-windows
          path: UnityAVExample/Build/CodexPullValidation

      - name: Run Unity Visual Validation
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\RustAV-Core\scripts\qa\run_unity_visual_validation.ps1" `
            -RustAVRoot "$env:GITHUB_WORKSPACE" `
            -CoreRoot "$env:GITHUB_WORKSPACE\RustAV-Core" `
            -ValidationPlayerExe "$env:GITHUB_WORKSPACE\UnityAVExample\Build\CodexPullValidation\CodexPullValidation.exe" `
            -RtspUri 'rtsp://127.0.0.1:8554/mystream' `
            -RtmpUri 'rtmp://127.0.0.1:1935/mystream' `
            -ValidationSeconds 8 `
            -MinPlaybackSeconds 2.0 `
            -AvSyncThresholdMs 200 `
            -FfmpegExe "$env:FFMPEG_EXE" `
            -MediaMtxExe "$env:MEDIA_MTX_EXE"

      - name: Upload Unity Validation Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustav-unity-visual-validation-logs
          path: artifacts/unity-validation
          if-no-files-found: warn

  android-build:
    name: Android arm64 Build
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      CARGO_NDK_PLATFORM: 21

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.inputs.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve RustAV-Core auth mode
        id: core-auth
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }
          if ($hasApp) {
            'mode=app' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'mode=pat' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create RustAV-Core app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core with app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout RustAV-Core with PAT
        if: ${{ steps.core-auth.outputs.mode == 'pat' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            RustAV-Core -> RustAV-Core/target

      - name: Cache Cargo Tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: ${{ runner.os }}-cargo-ndk-0.1

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev make perl pkg-config yasm nasm

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk --locked
          fi

      - name: Build Android Unity Plugin
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          python3 "$GITHUB_WORKSPACE/RustAV-Core/scripts/ci/build_unity_plugins.py" --public-root "$GITHUB_WORKSPACE" --core-root "$GITHUB_WORKSPACE/RustAV-Core" --platform android --output-root 'target/unity-package/android' --cargo-ndk-output 'target/android-unity-libs' --abi arm64-v8a

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-android-arm64-v8a-unity-plugin
          path: target/unity-package/android
          if-no-files-found: error

  ios-build:
    name: iOS XCFramework Build
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: macos-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.inputs.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve RustAV-Core auth mode
        id: core-auth
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }
          if ($hasApp) {
            'mode=app' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'mode=pat' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create RustAV-Core app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core with app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout RustAV-Core with PAT
        if: ${{ steps.core-auth.outputs.mode == 'pat' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            RustAV-Core -> RustAV-Core/target

      - name: Cache Xcode Derived Data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-derived-${{ hashFiles('RustAV-Core/ios-staticlib/Cargo.toml', 'RustAV-Core/Cargo.lock', '.github/workflows/rustav-matrix.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcode-derived-

      - name: Show Xcode Version
        run: |
          xcodebuild -version

      - name: Build iOS Unity Plugin
        run: |
          python3 "$GITHUB_WORKSPACE/RustAV-Core/scripts/ci/build_unity_plugins.py" --public-root "$GITHUB_WORKSPACE" --core-root "$GITHUB_WORKSPACE/RustAV-Core" --platform ios --manifest-path 'ios-staticlib/Cargo.toml' --target-dir 'target/ios-staticlib' --output-root 'target/unity-package/ios' --xcframework-output 'target/apple-unity/RustAV.xcframework'

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-ios-unity-plugin
          path: target/unity-package/ios
          if-no-files-found: error

  unity-plugins-package:
    name: Package Unity Plugins Bundle
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs:
      - windows-validate
      - android-build
      - ios-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.inputs.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve RustAV-Core auth mode
        id: core-auth
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }
          if ($hasApp) {
            'mode=app' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            'mode=pat' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create RustAV-Core app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core with app token
        if: ${{ steps.core-auth.outputs.mode == 'app' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout RustAV-Core with PAT
        if: ${{ steps.core-auth.outputs.mode == 'pat' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-windows-x86_64-unity-plugin
          path: artifacts/windows

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-android-arm64-v8a-unity-plugin
          path: artifacts/android

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: rustav-ios-unity-plugin
          path: artifacts/ios

      - name: Assemble Unity Plugins Bundle
        run: |
          python3 "$GITHUB_WORKSPACE/RustAV-Core/scripts/ci/build_unity_plugins.py" --public-root "$GITHUB_WORKSPACE" --platform package --windows-artifact 'artifacts/windows' --android-artifact 'artifacts/android' --ios-artifact 'artifacts/ios' --bundle-root 'UnityPlugins' --zip-output 'RustAV-UnityPlugins.zip'

      - name: Upload Unity Plugins Bundle
        uses: actions/upload-artifact@v4
        with:
          name: rustav-unity-plugins-bundle
          path: RustAV-UnityPlugins.zip
          if-no-files-found: error
