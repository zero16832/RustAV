name: Unity Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'scripts/**'
      - 'include/**'
      - 'TestFiles/**'
      - 'UnityAVExample/**'
      - 'UNITY_*.md'
      - 'PRODUCTION_RELEASE_CHECKLIST.md'
      - 'README.md'
  repository_dispatch:
    types:
      - rustav-core-updated
  workflow_dispatch:
    inputs:
      core_ref:
        description: 'RustAV-Core git ref or SHA'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: unity-release-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  UNITY_PROJECT_PATH: UnityAVExample
  CORE_REPOSITORY: zero16832/RustAV-Core

jobs:
  version:
    name: Compute Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      android_version_code: ${{ steps.version.outputs.android_version_code }}
      core_ref: ${{ steps.core-ref.outputs.core_ref }}
      core_sha: ${{ steps.core-sha.outputs.core_sha }}
      public_sha: ${{ steps.public-sha.outputs.public_sha }}
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve core ref
        id: core-ref
        shell: pwsh
        run: |
          $coreRef = "${{ github.event.client_payload.core_ref }}"
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = "${{ github.event.inputs.core_ref }}"
          }
          if ([string]::IsNullOrWhiteSpace($coreRef)) {
            $coreRef = 'main'
          }
          "core_ref=$coreRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate RustAV-Core checkout credentials
        shell: pwsh
        run: |
          $hasApp = (-not [string]::IsNullOrWhiteSpace("${{ vars.RUSTAV_CORE_APP_ID }}")) -and (-not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}"))
          $hasPat = -not [string]::IsNullOrWhiteSpace("${{ secrets.RUSTAV_CORE_CLONE_TOKEN }}")
          if (-not $hasApp -and -not $hasPat) {
            throw 'Configure vars.RUSTAV_CORE_APP_ID + secrets.RUSTAV_CORE_APP_PRIVATE_KEY, or secrets.RUSTAV_CORE_CLONE_TOKEN.'
          }

      - name: Create RustAV-Core app token
        if: ${{ vars.RUSTAV_CORE_APP_ID != '' && secrets.RUSTAV_CORE_APP_PRIVATE_KEY != '' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ steps.core-ref.outputs.core_ref }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token != '' && steps.core-app-token.outputs.token || secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Record public SHA
        id: public-sha
        shell: bash
        run: |
          echo "public_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Record core SHA
        id: core-sha
        shell: bash
        run: |
          echo "core_sha=$(git -C RustAV-Core rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compute Version
        id: version
        run: |
          python3 scripts/ci/compute_release_version.py --public-root "$GITHUB_WORKSPACE" --core-root "$GITHUB_WORKSPACE/RustAV-Core" --github-output

  plugin-windows:
    name: Build Windows Plugin
    runs-on: windows-latest
    needs: version
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create RustAV-Core app token
        if: ${{ vars.RUSTAV_CORE_APP_ID != '' && secrets.RUSTAV_CORE_APP_PRIVATE_KEY != '' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ needs.version.outputs.core_sha }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token != '' && steps.core-app-token.outputs.token || secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            RustAV-Core -> RustAV-Core/target

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.vcpkg
          key: ${{ runner.os }}-vcpkg-x64-windows-${{ hashFiles('.github/workflows/unity-release.yml', 'RustAV-Core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-

      - name: Setup FFmpeg (vcpkg)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE '.vcpkg'

          if (-not (Test-Path "$vcpkgRoot\.git")) {
            if (Test-Path $vcpkgRoot) {
              Remove-Item -LiteralPath $vcpkgRoot -Recurse -Force
            }
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          & "$vcpkgRoot\vcpkg.exe" install 'ffmpeg:x64-windows' --disable-metrics

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'VCPKG_DEFAULT_TRIPLET=x64-windows' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'VCPKGRS_DYNAMIC=1' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows Unity Plugin
        shell: pwsh
        run: |
          python scripts/ci/build_unity_plugins.py --public-root "$env:GITHUB_WORKSPACE" --core-root "$env:GITHUB_WORKSPACE\RustAV-Core" --platform windows --output-root 'target/unity-package/windows'

      - name: Upload Windows Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-windows-unity-plugin
          path: target/unity-package/windows
          if-no-files-found: error

  plugin-android:
    name: Build Android Plugin
    runs-on: ubuntu-latest
    needs: version
    env:
      CARGO_NDK_PLATFORM: 21
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create RustAV-Core app token
        if: ${{ vars.RUSTAV_CORE_APP_ID != '' && secrets.RUSTAV_CORE_APP_PRIVATE_KEY != '' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ needs.version.outputs.core_sha }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token != '' && steps.core-app-token.outputs.token || secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            RustAV-Core -> RustAV-Core/target

      - name: Cache Cargo Tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: ${{ runner.os }}-cargo-ndk-0.1

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev make perl pkg-config yasm nasm

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk --locked
          fi

      - name: Build Android Unity Plugin
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          python3 scripts/ci/build_unity_plugins.py --public-root "$GITHUB_WORKSPACE" --core-root "$GITHUB_WORKSPACE/RustAV-Core" --platform android --output-root 'target/unity-package/android' --cargo-ndk-output 'target/android-unity-libs' --abi arm64-v8a

      - name: Upload Android Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-android-unity-plugin
          path: target/unity-package/android
          if-no-files-found: error

  plugin-ios:
    name: Build iOS Plugin
    runs-on: macos-latest
    needs: version
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Create RustAV-Core app token
        if: ${{ vars.RUSTAV_CORE_APP_ID != '' && secrets.RUSTAV_CORE_APP_PRIVATE_KEY != '' }}
        id: core-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RUSTAV_CORE_APP_ID }}
          private-key: ${{ secrets.RUSTAV_CORE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            RustAV-Core

      - name: Checkout RustAV-Core
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CORE_REPOSITORY }}
          ref: ${{ needs.version.outputs.core_sha }}
          path: RustAV-Core
          token: ${{ steps.core-app-token.outputs.token != '' && steps.core-app-token.outputs.token || secrets.RUSTAV_CORE_CLONE_TOKEN }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            RustAV-Core -> RustAV-Core/target

      - name: Cache Xcode Derived Data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-derived-${{ hashFiles('RustAV-Core/ios-staticlib/Cargo.toml', 'RustAV-Core/Cargo.lock', '.github/workflows/unity-release.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcode-derived-

      - name: Build iOS Unity Plugin
        run: |
          python3 scripts/ci/build_unity_plugins.py --public-root "$GITHUB_WORKSPACE" --core-root "$GITHUB_WORKSPACE/RustAV-Core" --platform ios --manifest-path 'ios-staticlib/Cargo.toml' --target-dir 'target/ios-staticlib' --output-root 'target/unity-package/ios' --xcframework-output 'target/apple-unity/RustAV.xcframework'

      - name: Upload iOS Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustav-ios-unity-plugin
          path: target/unity-package/ios
          if-no-files-found: error

  plugin-bundle:
    name: Package Unity Plugins Bundle
    runs-on: ubuntu-latest
    needs:
      - version
      - plugin-windows
      - plugin-android
      - plugin-ios
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download Windows Plugin
        uses: actions/download-artifact@v4
        with:
          name: rustav-windows-unity-plugin
          path: artifacts/windows

      - name: Download Android Plugin
        uses: actions/download-artifact@v4
        with:
          name: rustav-android-unity-plugin
          path: artifacts/android

      - name: Download iOS Plugin
        uses: actions/download-artifact@v4
        with:
          name: rustav-ios-unity-plugin
          path: artifacts/ios

      - name: Assemble Unity Plugins Bundle
        run: |
          python3 scripts/ci/build_unity_plugins.py --public-root "$GITHUB_WORKSPACE" --platform package --windows-artifact 'artifacts/windows' --android-artifact 'artifacts/android' --ios-artifact 'artifacts/ios' --bundle-root 'UnityPlugins' --zip-output 'RustAV-UnityPlugins-v${{ needs.version.outputs.version }}.zip'

      - name: Create Release Manifest
        shell: bash
        run: |
          cat > release-manifest.json <<EOF
          {
            "version": "${{ needs.version.outputs.version }}",
            "tag": "${{ needs.version.outputs.tag }}",
            "public_sha": "${{ needs.version.outputs.public_sha }}",
            "core_sha": "${{ needs.version.outputs.core_sha }}",
            "core_repository": "${{ env.CORE_REPOSITORY }}"
          }
          EOF

      - name: Upload Unity Plugins Bundle
        uses: actions/upload-artifact@v4
        with:
          name: rustav-unity-plugins-bundle
          path: |
            RustAV-UnityPlugins-v${{ needs.version.outputs.version }}.zip
            release-manifest.json
          if-no-files-found: error

  unity-build:
    name: Build Unity Player (${{ matrix.label }})
    if: ${{ vars.RUSTAV_ENABLE_UNITY_BUILD == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - version
      - plugin-bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows
            target_platform: StandaloneWindows64
            rustav_target: StandaloneWindows64
            build_output_relative: Builds/StandaloneWindows64/RustAVExample/RustAVExample.exe
            zip_source_relative: Builds/StandaloneWindows64/RustAVExample
            asset_name_prefix: RustAVExample-Windows64
          - label: android
            target_platform: Android
            rustav_target: Android
            build_output_relative: Builds/Android/RustAVExample.apk
            zip_source_relative: Builds/Android/RustAVExample.apk
            asset_name_prefix: RustAVExample-Android
          - label: ios
            target_platform: iOS
            rustav_target: iOS
            build_output_relative: Builds/iOS/RustAVExample
            zip_source_relative: Builds/iOS/RustAVExample
            asset_name_prefix: RustAVExample-iOS
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download Unity Plugins Bundle
        uses: actions/download-artifact@v4
        with:
          name: rustav-unity-plugins-bundle
          path: artifacts/plugin-bundle

      - name: Extract Unity Plugins Bundle
        run: |
          python3 -m zipfile -e "artifacts/plugin-bundle/RustAV-UnityPlugins-v${{ needs.version.outputs.version }}.zip" .

      - name: Inject Plugins Into Unity Project
        run: |
          python3 scripts/ci/sync_unity_plugins_to_project.py --public-root "$GITHUB_WORKSPACE" --unity-project "$UNITY_PROJECT_PATH" --plugins-root 'UnityPlugins/Assets/Plugins' --managed-runtime-root 'UnityPlugins/Assets/UnityAV' --build-support-root 'UnityPlugins/BuildSupport'

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/${{ env.UNITY_PROJECT_PATH }}/Library
          key: ${{ runner.os }}-unity-library-${{ matrix.label }}-${{ hashFiles('UnityAVExample/Assets/**', 'UnityAVExample/Packages/manifest.json', 'UnityAVExample/ProjectSettings/**', '.github/workflows/unity-release.yml') }}
          restore-keys: |
            ${{ runner.os }}-unity-library-${{ matrix.label }}-

      - name: Set Build Paths
        shell: bash
        run: |
          VERSION='${{ needs.version.outputs.version }}'
          echo "ZIP_SOURCE=${UNITY_PROJECT_PATH}/${{ matrix.zip_source_relative }}" >> "$GITHUB_ENV"
          echo "ZIP_OUTPUT=${GITHUB_WORKSPACE}/release-assets/${{ matrix.asset_name_prefix }}-v${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Build Unity Player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.target_platform }}
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          allowDirtyBuild: true
          buildMethod: UnityAV.Editor.RustAVReleaseBuild.BuildFromCi
          customParameters: >-
            -rustavTarget=${{ matrix.rustav_target }}
            -rustavOutput=${{ matrix.build_output_relative }}
            -rustavVersion=${{ needs.version.outputs.version }}
            -rustavAndroidVersionCode=${{ needs.version.outputs.android_version_code }}

      - name: Package Unity Player Artifact
        run: |
          python3 scripts/ci/zip_directory.py --source "$ZIP_SOURCE" --output "$ZIP_OUTPUT"

      - name: Upload Unity Player Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-player-${{ matrix.label }}
          path: ${{ env.ZIP_OUTPUT }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        needs.version.result == 'success' &&
        needs.plugin-bundle.result == 'success' &&
        (needs.unity-build.result == 'success' || needs.unity-build.result == 'skipped')
      }}
    needs:
      - version
      - plugin-bundle
      - unity-build
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten Release Assets
        shell: bash
        run: |
          mkdir -p flat-release-assets
          find release-assets -type f \( -name '*.zip' -o -name 'release-manifest.json' \) -exec cp {} flat-release-assets/ \;
          ls -al flat-release-assets

      - name: Create Git Tag
        shell: bash
        run: |
          TAG='${{ needs.version.outputs.tag }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo 'tag_exists=true' >> "$GITHUB_ENV"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create Release Notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Automated release artifacts:

          - RustAV Unity plugin bundle
          EOF
          if [ "${{ vars.RUSTAV_ENABLE_UNITY_BUILD }}" = "true" ]; then
            cat >> release-notes.md <<EOF
          - Unity Windows sample player
          - Unity Android sample player
          - Unity iOS Xcode project
          EOF
          else
            cat >> release-notes.md <<EOF
          - Unity sample player build is disabled in this run
          EOF
          fi
          cat >> release-notes.md <<EOF

          Build manifest:

          - version: ${{ needs.version.outputs.version }}
          - public_sha: ${{ needs.version.outputs.public_sha }}
          - core_sha: ${{ needs.version.outputs.core_sha }}
          - core_repository: ${{ env.CORE_REPOSITORY }}
          EOF

      - name: Create Or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG='${{ needs.version.outputs.tag }}'
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" flat-release-assets/* --clobber
          else
            gh release create "$TAG" flat-release-assets/* --title "$TAG" --notes-file release-notes.md
          fi
